<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOVE Dance Academy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:linear-gradient(
    180deg,
    #fff9fc 0%,
    #fff5fa 100%
    );

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:35px;

}

.container{

    width:100%;
    max-width:520px;

    text-align:center;

}

.logo{

    width:100%;
    max-width:430px;

    margin:auto;
    display:block;

    margin-bottom:25px;

}

.subtitle{

    font-size:28px;

    font-weight:600;

    color:#666;

    margin-bottom:45px;

}

.btn{

    display:block;

    text-decoration:none;

    background:#ee4b97;

    color:white;

    padding:24px;

    margin-bottom:22px;

    border-radius:24px;

    font-size:30px;

    font-weight:700;

    transition:.20s;

    box-shadow:
    0 10px 25px rgba(238,75,151,.20);

}

.btn:hover{

    transform:scale(1.02);

    background:#ea3c8e;

}

.footer{

    margin-top:45px;

    color:#888;

    font-size:22px;

    font-weight:500;

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="MOVE Dance Academy">

<div class="subtitle">
✨ Bienvenidos ✨
</div>

<a class="btn"
href="https://movedanceasistencia.fillout.com/t/7R2tz7q9qVus">

👧 Inscripción Alumnas/os

</a>

<a class="btn"
href="https://movedanceasistencia.fillout.com/t/tAcHw7cnXAus">

🩰 Inscripción Adultos

</a>

<a class="btn"
href="https://airtable.com/appPEfqYLEyfLcRJE/pag0tXtzA6buwpdNe/form">

💃 Asistencia Alumnas

</a>

<a class="btn"
href="https://airtable.com/appPEfqYLEyfLcRJE/pagmaQIeeyKiSmdMu/form">

👩‍🏫 Asistencia Maestras

</a>

<div class="footer">
🩷 Que tengan una hermosa clase 🩷
</div>

</div>

</body>

</html>
